<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Vibe Coding 手把手實戰班 - 用 LINE OA 打造銷售/預約系統 MVP 的課程學習引導">
  <title>Vibe Coding 課程引導手冊</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="header-brand">Vibe Coding<span>課程引導手冊</span></div>
      <div class="header-progress" id="progressText">0 / 0 完成</div>
    </div>
  </header>

  <nav class="tab-nav">
    <div class="tab-nav-inner" id="tabNav"></div>
  </nav>

  <main class="main-content" id="mainContent"></main>

  <script src="data.js?v=20260708-02"></script>
  <script>
    (function () {
      const nav = document.getElementById('tabNav');
      const main = document.getElementById('mainContent');

      // Build tabs
      STAGES.forEach((stage, i) => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
        btn.dataset.target = stage.id;
        btn.innerHTML = `<span class="tab-num">${i + 1}</span>${stage.label}`;
        btn.addEventListener('click', () => switchTab(stage.id));
        nav.appendChild(btn);
      });

      // Build panels
      STAGES.forEach((stage, i) => {
        const panel = document.createElement('div');
        panel.className = 'tab-panel' + (i === 0 ? ' active' : '');
        panel.id = `panel-${stage.id}`;
        panel.innerHTML = renderStage(stage);
        main.appendChild(panel);
      });

      function switchTab(id) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.target === id));
        document.querySelectorAll('.tab-panel').forEach(p => {
          p.classList.remove('active');
          if (p.id === `panel-${id}`) {
            void p.offsetWidth;
            p.classList.add('active');
          }
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function renderStage(stage) {
        let html = `
      <div class="stage-header">
        <div class="stage-badge ${stage.color}">${stage.label}</div>
        <h1 class="stage-title">${stage.title}</h1>
        <p class="stage-desc">${stage.desc}</p>
      </div>
      <div class="step-list">
    `;
        stage.steps.forEach((step, si) => {
          html += `<div class="step-card">
        <div class="step-header">
          <div class="step-number ${stage.color}">${si + 1}</div>
          <div>
            <div class="step-title">${step.title}</div>
            ${step.subtitle ? `<div class="step-subtitle">${step.subtitle}</div>` : ''}
          </div>
        </div>
        <div class="step-body">
          <p>${step.body}</p>`;

          // Vibe Coding intro block
          if (step.vibeCodingIntro) {
            html += `
          <div class="info-card info-card--blue">
            <div class="info-card__title">🆚 Vibe Coding vs. 傳統方式，有什麼不同？</div>
            <div class="compare-grid">
              <div class="compare-col compare-col--bad">
                <div class="compare-col__label">❌ 傳統寫程式</div>
                <ul>
                  <li>要先學語法、資料結構、部署流程</li>
                  <li>從零開始，門檻極高</li>
                  <li>一個人搞定一切，容易卡關</li>
                </ul>
              </div>
              <div class="compare-col compare-col--bad">
                <div class="compare-col__label">⚠️ 只跟 ChatGPT 聊天</div>
                <ul>
                  <li>AI 給你一段程式碼，但你不知道放哪</li>
                  <li>無法直接產出可執行的完整系統</li>
                  <li>還是要你自己想辦法拼湊</li>
                </ul>
              </div>
              <div class="compare-col compare-col--good">
                <div class="compare-col__label">✅ Vibe Coding</div>
                <ul>
                  <li>你負責：描述需求、驗收成果、拍板決定</li>
                  <li>AI 負責：寫程式、建資料庫、部署上線</li>
                  <li>你是「老闆」，AI 是「全端工程師」</li>
                </ul>
              </div>
            </div>
            <div class="info-card__footer">今天的課程，就是帶你學會「如何當一個優秀的 AI 老闆」。</div>
          </div>`;
          }

          // Glossary block
          if (step.glossary) {
            html += `
          <div class="glossary-table">
            <table>
              <thead><tr><th>術語</th><th>白話翻譯</th><th>生活比喻</th></tr></thead>
              <tbody>
                <!--tr><td><code>cd</code></td><td>切換目錄</td><td>用滑鼠點兩下進入資料夾</td></tr>
                <tr><td><code>pwd</code></td><td>顯示目前路徑</td><td>看你現在人在哪個資料夾</td></tr>
                <tr><td><code>mkdir</code></td><td>建立資料夾</td><td>滑鼠右鍵 → 新增資料夾</td></tr>
                <tr><td><code>npm run dev</code></td><td>啟動本地測試</td><td>在自己電腦開一個只有你看得到的暫時測試網頁</td></tr>
                <tr><td><code>wrangler deploy</code></td><td>部署上線</td><td>把網站打包上傳到雲端，讓全世界都能透過網址連進來</td></tr-->
                <tr><td><code>D1 Database</code></td><td>Cloudflare 資料庫</td><td>超級 Excel 試算表，用來存商品清單和客人訂單</td></tr>
                <tr><td><code>Webhook</code></td><td>事件通知機制</td><td>門鈴。客人在 LINE 敲你，LINE 就去按 Cloudflare 的門鈴通知系統</td></tr>
                <tr><td><code>Skill / Plugin</code></td><td>AI 附加技能包</td><td>就像幫手機安裝 App，讓 AI 多了特定的操作能力</td></tr>
                <tr><td><code>部署 (Deploy)</code></td><td>發布上線</td><td>把程式從你的電腦搬到雲端伺服器，公開給大家使用</td></tr>
                <tr><td><code>Cloudflare Worker</code></td><td>雲端小程式主機</td><td>免費的雲端機器人，負責接收 LINE 訊息、查資料庫、回覆通知</td></tr>
                
                
                
              </tbody>
            </table>
          </div>`;
          }

          // Debug SOP block
          if (step.debugSop) {
            html += `
          <div class="info-card info-card--orange">
            <div class="info-card__title">🛠️ 遇到報錯怎麼辦？四步驟 SOP</div>
            <div class="sop-steps">
              <div class="sop-step"><span class="sop-num">1</span><div><strong>冷靜，不要慌</strong><br>報錯是正常的，每個人環境不同，跑不出來很常見。</div></div>
              <div class="sop-step"><span class="sop-num">2</span><div><strong>截圖 + 複製錯誤訊息</strong><br>把終端機（Terminal）的紅字錯誤訊息全部框選複製，或截圖。</div></div>
              <div class="sop-step"><span class="sop-num">3</span><div><strong>丟給 AI 排查</strong><br>打開你的 AI 工具，貼上錯誤訊息並說：「我跑這個指令出錯了，幫我看看怎麼修」</div></div>
              <div class="sop-step"><span class="sop-num">4</span><div><strong>照著 AI 指示修正</strong><br>AI 給的解法通常能解決 80% 的問題。解決後繼續往下走。</div></div>
            </div>
            <div class="info-card__footer">⭐ 這才是 Vibe Coding 的精髓：你不需要懂所有報錯，但要懂得用 AI 幫你解讀！</div>
          </div>`;
          }

          // AI Tips block
          if (step.aiTips) {
            html += `
          <div class="info-card info-card--purple">
            <div class="info-card__title">🗣️ 如何最有效率地跟 AI 說話？</div>
            <div class="ai-tips-grid">
              <div class="ai-tip">
                <div class="ai-tip__icon">🎤</div>
                <div><strong>用語音輸入說白話文</strong><br>想不到怎麼打字？直接對著麥克風講。把你的需求稀哩嘩啦說出來，AI 會幫你整理成有邏輯的架構。</div>
              </div>
              <div class="ai-tip">
                <div class="ai-tip__icon">🤔</div>
                <div><strong>想清楚再送出</strong><br>避免一次送出一個字、一句話就按送出的「碎語模式」，這樣會大量消耗 Token 額度，而且 AI 不容易理解你的完整意圖。</div>
              </div>
              <div class="ai-tip">
                <div class="ai-tip__icon">📸</div>
                <div><strong>報錯就截圖</strong><br>遇到任何錯誤，把截圖或錯誤訊息直接附上，比用文字描述「它壞掉了」有效一百倍。</div>
              </div>
              <div class="ai-tip">
                <div class="ai-tip__icon">✅</div>
                <div><strong>描述「預期結果」</strong><br>告訴 AI「我希望按下按鈕後，庫存自動減 1 並發通知」比說「幫我加功能」明確太多了。</div>
              </div>
            </div>
          </div>`;
          }

          // Future expansion block
          if (step.futureExpansion) {
            html += `
          <div class="info-card info-card--green">
            <div class="info-card__title">🚀 今天只是起點，未來可以無限延伸！</div>
            <p style="margin-bottom:16px;color:var(--c-text-secondary)">今天完成的是 MVP（最小可行產品）。未來想加功能，做法都一樣：<strong>把需求具體描述給 AI，讓 AI 幫你規劃並改寫系統。</strong></p>
            <div class="expansion-grid">
              <div class="expansion-item"><span class="expansion-icon">💳</span><strong>加入金流</strong><br>整合 LINE Pay 或綠界金流，讓客人直接在 LINE 完成付款</div>
              <div class="expansion-item"><span class="expansion-icon">📅</span><strong>多時段預約</strong><br>讓一個商品支援多個時段選擇，並自動管理各時段名額</div>
              <div class="expansion-item"><span class="expansion-icon">👥</span><strong>會員 CRM</strong><br>記錄每位客人的消費紀錄，發送個人化優惠訊息</div>
              <div class="expansion-item"><span class="expansion-icon">📊</span><strong>銷售儀表板</strong><br>自動統計每日/每週訂單與營收，用圖表呈現</div>
            </div>
          </div>`;
          }

          // Template selector
          if (step.templateSelector) {
            html += `
          <div class="template-selector">
            <div class="template-selector__label">選擇符合你產業的範本（點擊後自動填入下方欄位）：</div>
            <div class="template-btns">
              <button class="template-btn" onclick="applyTemplate('ecommerce')">🛍️ 電商商品販售版<br><small>實體商品 / 網路賣家</small></button>
              <button class="template-btn" onclick="applyTemplate('booking')">📅 課程/活動預約版<br><small>老師 / 美甲師 / 顧問</small></button>
            </div>
          </div>`;
          }

          // Image
          if (step.image) {
            html += `
          <div class="step-image-container" style="margin: 16px 0; border: 1px solid var(--c-border); border-radius: var(--radius); overflow: hidden; max-width: 100%;">
            <img src="${step.image}" alt="LINE OA MVP 流程圖" style="width: 100%; height: auto; display: block; object-fit: contain;">
          </div>
        `;
          }

          // Flow diagram
          if (step.flow) {
            html += '<div class="flow-diagram">';
            step.flow.forEach((node, ni) => {
              html += `<span class="flow-node">${node}</span>`;
              if (ni < step.flow.length - 1) html += '<span class="flow-arrow">&rarr;</span>';
            });
            html += '</div>';
          }

          // Tech pills
          if (step.techs) {
            html += '<div class="tech-pills">';
            step.techs.forEach(t => { html += `<span class="tech-pill">${t}</span>`; });
            html += '</div>';
          }

          // Checklist
          if (step.checklist) {
            html += '<ul class="checklist">';
            step.checklist.forEach((item, ci) => {
              const uid = `${stage.id}-${si}-${ci}`;
              html += `<li><input type="checkbox" id="${uid}" onchange="updateProgress()"><label for="${uid}">${item}</label></li>`;
            });
            html += '</ul>';
          }

          // Extra text
          if (step.extra) {
            html += `<p style="margin-top:8px;font-size:13px;color:var(--c-text-muted)">${step.extra}</p>`;
          }

          // Result box
          if (step.result) {
            html += `<div class="result-box">${step.result}</div>`;
          }

          // Tip box (white-talk explanation)
          if (step.tip) {
            html += `<div class="tip-box">${step.tip}</div>`;
          }

          // Worksheet
          if (step.worksheet) {
            html += renderWorksheet(step.worksheet, `${stage.id}-${si}`);
          }

          // Prompt box
          if (step.promptBox) {
            html += `
          <div class="prompt-output-box">
            <div class="prompt-output-header">
              <span>整合 AI 提示詞</span>
              <button class="copy-btn" id="btn-copy-${step.promptBox.id}" onclick="copyToClipboard('${step.promptBox.id}')">${step.promptBox.buttonText}</button>
            </div>
            <textarea id="${step.promptBox.id}" readonly class="prompt-textarea" placeholder="填寫完前述步驟後，此處將動態生成相關提示詞..."></textarea>
          </div>
        `;
          }

          // Antifraud notice already in body HTML, tip also rendered after worksheet
          html += '</div></div>';
        });
        html += '</div>';
        return html;
      }

      function renderWorksheet(ws, prefix) {
        let html = `<div class="worksheet">
      <div class="worksheet-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        ${ws.title}
      </div>
      <div class="ws-grid">`;
        ws.fields.forEach((f, fi) => {
          const fid = f.id || `ws-${prefix}-${fi}`;
          if (f.type === 'textarea') {
            html += `</div><div class="ws-field"><label for="${fid}">${f.label}</label>
          <textarea id="${fid}" placeholder="${f.hint || ''}"></textarea>
          ${f.hint ? `<div class="ws-hint">${f.hint}</div>` : ''}</div><div class="ws-grid">`;
          } else {
            html += `<div class="ws-field"><label for="${fid}">${f.label}</label>
          <input type="text" id="${fid}" placeholder="${f.hint || ''}">
          ${f.hint ? `<div class="ws-hint">${f.hint}</div>` : ''}</div>`;
          }
        });
        html += '</div>';

        if (ws.hasCopyOutput) {
          html += `
        <div class="copy-output-box">
          <div class="copy-output-header">
            <span>LINE 憑證複製區</span>
            <button class="copy-btn" onclick="copyToClipboard('${ws.copyTargetId}')">一鍵複製</button>
          </div>
          <textarea id="${ws.copyTargetId}" readonly class="copy-textarea" placeholder="在此處填寫上方欄位後，會自動產生方便複製的格式..."></textarea>
        </div>
      `;
        }

        html += '</div>';
        return html;
      }

      // Apply industry template
      window.applyTemplate = function (type) {
        const tpl = TEMPLATES[type];
        if (!tpl) return;
        const fields = {
          product_fields: tpl.productFields,
          order_fields: tpl.orderFields,
          admin_notify_tpl: tpl.adminNotify,
          user_notify_tpl: tpl.userNotify
        };
        Object.entries(fields).forEach(([id, val]) => {
          const el = document.getElementById(id);
          if (el) el.value = val;
        });
        // Highlight active button
        document.querySelectorAll('.template-btn').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');
        saveAllInputs();
        updateDynamicOutputs();
      };

      // Save all input fields
      function saveAllInputs() {
        const data = {};
        document.querySelectorAll('input[type="text"], textarea').forEach(el => {
          if (el.id && !el.readOnly) {
            data[el.id] = el.value;
          }
        });
        try { localStorage.setItem('vibe-course-inputs', JSON.stringify(data)); } catch (e) { }
      }

      // Restore all input fields
      function restoreAllInputs() {
        try {
          const saved = JSON.parse(localStorage.getItem('vibe-course-inputs') || '{}');
          Object.entries(saved).forEach(([id, val]) => {
            const el = document.getElementById(id);
            if (el) el.value = val;
          });
        } catch (e) { }
      }

      // Dynamic Prompt & Credentials updates
      function updateDynamicOutputs() {
        const channelId = document.getElementById('line_channel_id')?.value || '';
        const channelSecret = document.getElementById('line_channel_secret')?.value || '';
        const accessToken = document.getElementById('line_access_token')?.value || '';

        // Credentials Area
        const credsArea = document.getElementById('line_credentials_copy');
        if (credsArea) {
          credsArea.value = `Channel ID: ${channelId}\nChannel Secret: ${channelSecret}\nAccess Token: ${accessToken}`;
        }

        // Step 1 Prompt Box (System Builder)
        const productFields = document.getElementById('product_fields')?.value || '商品名稱, 價格, 上下架狀態, 上架時間, 下架時間, 剩餘庫存';
        const orderFields = document.getElementById('order_fields')?.value || '購買人姓名, 商品名稱, 付款狀態';
        const adminNotify = document.getElementById('admin_notify_tpl')?.value || '[未設定管理員通知範本]';
        const userNotify = document.getElementById('user_notify_tpl')?.value || '[未設定客戶通知範本]';

        const promptArea = document.getElementById('system_prompt_output');
        if (promptArea) {
          promptArea.value = `你是一個專業的 Cloudflare & LINE OA 開發專家。請根據以下設定，使用 Cloudflare Worker + D1 Database 建立一套「LINE OA 銷售系統 MVP」。

【LINE OA 憑證設定】
- Channel ID: ${channelId || '[請回前步驟填寫 Channel ID]'}
- Channel Secret: ${channelSecret || '[請回前步驟填寫 Channel Secret]'}
- Access Token: ${accessToken || '[請回前步驟填寫 Access Token]'}

【系統資料表規格】
- 商品表 (products) 欄位結構定義: ${productFields}
- 訂單表 (orders) 欄位結構定義: ${orderFields}
- 通知範本設定:
  * 管理員通知內容範本:
    ${adminNotify}
  * 客戶通知內容範本:
    ${userNotify}

【開發實作要求】
1. Webhook 接收 LINE 訊息與 Rich Menu 點擊事件：
   - 系統需配合一個 2 欄位 (2-column) 的 Rich Menu（左按鈕：瀏覽商品，右按鈕：聯絡客服）。
   - 當用戶點擊「瀏覽商品」（或輸入「購買」）時：從資料庫讀取處於「上架狀態」且在有效期內的商品，回傳商品 Flex Message 輪播。
   - 當用戶點擊「聯絡客服」時：回傳一則預設的客服聯絡文字資訊。
   - 用戶選取指定商品後，系統自動建立訂單、寫入 D1 資料庫（預設狀態為「未付款」），扣減該商品的剩餘庫存，並發送「雙向通知」（管理員與客戶）。
2. 建立後台管理介面：
   - 【商品管理】：完整的商品管理，依照前面的欄位定義。
   - 【訂單管理】：檢視訂單列表，提供切換「已付款 / 未付款」按鈕，以及「刪除訂單」按鈕。
   - 當管理員點擊「刪除訂單」時，系統必須自動釋放庫存，將對應的商品庫存加回去！`;
        }

        // Step 9 Rich Menu Image Prompt
        const richMenuArea = document.getElementById('rich_menu_image_prompt');
        if (richMenuArea) {
          richMenuArea.value = `A premium, minimalistic 2-column grid layout for a mobile app LINE Official Account Rich Menu, aspect ratio 2:1.
The background is an elegant cream white with clean cobalt blue dividers.
Each column contains a clean, modern line icon and a single text label:
- Left Column: A shopping bag icon with text "瀏覽商品" (Browse Products).
- Right Column: A chat bubble icon with text "聯絡客服" (Contact Us).
Clean typography, high-end editorial look, flat design, no gradients, professional user interface layout, 4k resolution. --ar 2:1`;
        }
      }

      // Copy to Clipboard with Visual Feedback
      window.copyToClipboard = function (id) {
        const el = document.getElementById(id);
        if (!el) return;
        el.select();
        el.setSelectionRange(0, 99999);
        try {
          navigator.clipboard.writeText(el.value).then(() => {
            const btn = document.querySelector(`button[onclick*="${id}"]`) || document.getElementById(`btn-copy-${id}`);
            if (btn) {
              const originalText = btn.textContent;
              btn.textContent = '已複製！';
              btn.style.background = 'var(--c-success)';
              btn.style.color = '#fff';
              setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = '';
                btn.style.color = '';
              }, 1500);
            }
          });
        } catch (err) {
          alert('複製失敗，請手動選取複製！');
        }
      };

      // Listen for input events
      document.body.addEventListener('input', (e) => {
        if (e.target.matches('input, textarea')) {
          saveAllInputs();
          updateDynamicOutputs();
        }
      });

      // Progress tracking
      window.updateProgress = function () {
        const all = document.querySelectorAll('.checklist input[type="checkbox"]');
        const checked = document.querySelectorAll('.checklist input[type="checkbox"]:checked');
        document.getElementById('progressText').textContent = `${checked.length} / ${all.length} 完成`;
        const state = {};
        all.forEach(cb => { state[cb.id] = cb.checked; });
        try { localStorage.setItem('vibe-course-progress', JSON.stringify(state)); } catch (e) { }
      };

      // Restore state
      restoreAllInputs();
      updateDynamicOutputs();

      try {
        const saved = JSON.parse(localStorage.getItem('vibe-course-progress') || '{}');
        Object.entries(saved).forEach(([id, checked]) => {
          const cb = document.getElementById(id);
          if (cb) cb.checked = checked;
        });
      } catch (e) { }
      window.updateProgress();

    })();
  </script>

</body>

</html>
